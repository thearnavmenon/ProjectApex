# .github/workflows/ci.yml
# Project Apex — CI Pipeline
#
# Runs on every push and pull_request to main.
# Builds the project and executes the full unit-test suite (mock-only tests).
# Real-API integration tests are excluded via the absence of APEX_INTEGRATION_TESTS=1.
#
# TDD Section 14.6 compliance:
#   • macOS 15 runner
#   • Xcode 16
#   • iPhone 16 Pro simulator
#   • Test results uploaded as artifact on failure

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Diagnostic — list runner Xcode and simulator runtimes (for #28)
        # One-shot diagnostic to surface what the macos-15 runner image actually
        # has installed. Will be reverted in PR-2 once the destination pin is
        # known. Do not merge this PR.
        run: |
          echo "===== xcrun simctl list runtimes ====="
          xcrun simctl list runtimes
          echo
          echo "===== ls /Applications | grep -i Xcode ====="
          ls /Applications | grep -i Xcode
          echo
          echo "===== xcodebuild -showsdks ====="
          xcodebuild -showsdks

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ProjectApex.xcodeproj \
            -scheme ProjectApex

      - name: Build & Test
        # APEX_INTEGRATION_TESTS is intentionally absent — live-API tests are skipped.
        run: |
          xcodebuild test \
            -project ProjectApex.xcodeproj \
            -scheme ProjectApex \
            -testPlan ProjectApex \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --color --report junit --output test-results.xml \
            ; exit ${PIPESTATUS[0]}

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults.xcresult
            test-results.xml
          retention-days: 7
