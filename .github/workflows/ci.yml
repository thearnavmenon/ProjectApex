# .github/workflows/ci.yml
# Project Apex — CI Pipeline
#
# Runs on every push and pull_request to main.
# Builds the project and executes the full unit-test suite (mock-only tests).
# Real-API integration tests are excluded via the absence of APEX_INTEGRATION_TESTS=1.
#
# Toolchain pin (closes #28):
#   • macOS 15 runner (hosted macos-15 image)
#   • Xcode 26.3 — newest Xcode on the runner image. Xcode 16.x ships iOS 18 SDK
#     and cannot build the project (IPHONEOS_DEPLOYMENT_TARGET=26.2 needs iOS 26 SDK).
#   • iPhone 17 Pro / iOS 26.2 simulator — iOS 26.2 is the only simulator runtime
#     on the macos-15 image that meets the deployment target (iOS 26.0 and 26.1
#     are below it; iOS 26.3 is not yet shipped on the runner).
#   • OS pinned explicitly (no OS=latest) so the runner image's catalog rotation
#     can't silently break this workflow again.
#   • Test results uploaded as artifact on failure

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Initialise CoreSimulator under selected Xcode
        # Initialises CoreSimulator under non-default Xcode — required before xcodebuild
        # can resolve simulator destinations (see PR #57). Do not remove.
        run: xcrun simctl list devices "com.apple.CoreSimulator.SimRuntime.iOS-26-2" available

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ProjectApex.xcodeproj \
            -scheme ProjectApex

      - name: Build & Test
        # APEX_INTEGRATION_TESTS is intentionally absent — live-API tests are skipped.
        run: |
          xcodebuild test \
            -project ProjectApex.xcodeproj \
            -scheme ProjectApex \
            -testPlan ProjectApex \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.2' \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --color --report junit --output test-results.xml \
            ; exit ${PIPESTATUS[0]}

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults.xcresult
            test-results.xml
          retention-days: 7

  # Edge Function tests — Deno integration suite + end-to-end HTTP smoke.
  # Closes the test-coverage gap surfaced by the Phase 2 integration audit
  # (docs/phase-2-integration-audit-2026-05-10.md): existing tests covered
  # rule modules in isolation with hand-fed preconditions; production
  # callers don't satisfy them. The smoke test exercises the full
  # HTTP → orchestrator → DB pipeline against a fresh user. As subsequent
  # Phase 3 wiring slices (A17–A23) extend the smoke's assertion set, this
  # job catches integration-debt regrowth before merge.
  ef-test:
    name: Edge Function Tests (Deno)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (applies migrations on first start)
        run: supabase start

      - name: Serve Edge Function in background
        run: |
          nohup supabase functions serve update-trainee-model --no-verify-jwt > ef.log 2>&1 &

      - name: Wait for Edge Function ready
        # Empty-body POST yields HTTP 400 from validateRequest's
        # "request body must be a JSON object" check — confirms the
        # function process is up and routing.
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              http://127.0.0.1:54321/functions/v1/update-trainee-model \
              -H "Content-Type: application/json" -d '{}' || true)
            if [ "$code" = "400" ]; then
              echo "EF ready (HTTP 400 on empty body — validateRequest)"
              exit 0
            fi
            echo "attempt $i: code=$code"
            sleep 2
          done
          echo "EF did not become ready within 120s"
          cat ef.log || true
          exit 1

      - name: Run EF tests (orchestrator + smoke)
        working-directory: supabase/functions/update-trainee-model
        run: deno test --allow-net --allow-env --allow-read --no-check

      - name: Show EF log on failure
        if: failure()
        run: cat ef.log || true

      - name: Stop Supabase
        if: always()
        run: supabase stop || true

  # Auto-deploy to the linked Supabase project on merge to main.
  # Closes the half-deployed gap pattern documented in #143: prior to this job,
  # `supabase db push --linked` and `supabase functions deploy` were manual admin
  # steps that got forgotten — Phase 2 shipped triple-broken on 2026-05-12 because
  # of three independent instances of this gap (#135-shape EF stub, #139 migration
  # not applied, plus the producer-wiring fix in #137 that was only observable
  # after the other two landed).
  #
  # Required GitHub Actions secrets:
  #   SUPABASE_ACCESS_TOKEN — personal access token for the Supabase CLI
  #   SUPABASE_DB_PASSWORD  — database password for the linked project
  #
  # Failure mode: forward-only. If `db push` fails the job fails and EF deploy is
  # skipped. If `db push` succeeds but EF deploy fails, schema is ahead of EF;
  # operator rolls forward by re-running deploy, or rolls schema back manually
  # via docs/migrations/down/.
  deploy:
    name: Deploy to linked Supabase
    runs-on: ubuntu-latest
    # Intentionally NOT gated on the iOS `test` job. iOS Build & Test is known-flaky
    # (standing admin-merge permission documented in auto-memory: "don't block on
    # the iOS Build & Test flake"). Gating deploy on it inherits the flake — a
    # transient iOS failure would silently skip schema + EF deploy, reproducing
    # the half-deployed shape this workflow exists to prevent (first observed when
    # PR #144's own merge landed and the deploy was skipped on the same flake).
    # iOS app code and Supabase artifacts are independent deploy targets; gating
    # only on `ef-test` (Deno integration) is the correct correlation.
    needs: [ef-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to project
        run: supabase link --project-ref hqjgrlzvrttnyfjqjewe

      - name: Apply migrations
        run: supabase db push --linked

      - name: Deploy update-trainee-model Edge Function
        run: supabase functions deploy update-trainee-model --project-ref hqjgrlzvrttnyfjqjewe

      - name: Deploy update-trainee-goal Edge Function
        run: supabase functions deploy update-trainee-goal --project-ref hqjgrlzvrttnyfjqjewe
